name: NPM Beta Release (Deprecated)

on:
  workflow_dispatch:
    inputs:
      snapshot_tag:
        description: 'NPM dist-tag for the beta release'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - alpha
          - rc
          - preview

jobs:
  beta-release:
    runs-on: ubuntu-latest
    steps:
      - name: Redirect to release workflow
        run: |
          echo "::error::Beta publishing moved to the Release workflow."
          echo "Run the 'Release' workflow via workflow_dispatch and choose the desired snapshot tag."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Beta Release Workflow Moved" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use the \`Release\` workflow instead." >> $GITHUB_STEP_SUMMARY
          echo "Choose the desired snapshot tag when manually dispatching it." >> $GITHUB_STEP_SUMMARY
          exit 1
