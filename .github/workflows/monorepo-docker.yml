name: Build and Push Monorepo Image
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - '.dockerignore'
      - '.registryrc'
      - '.github/workflows/monorepo-docker.yml'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - '.dockerignore'
      - '.registryrc'
      - '.github/workflows/monorepo-docker.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      include_arm64:
        description: 'Include arm64 in the build'
        required: false
        default: 'false'

concurrency:
  group: build-push-monorepo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          persist-credentials: false
      - name: Generate tag data
        id: taggen
        run: |
          echo "TAG_DATE=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "TAG_SHA=$(echo '${{ github.event.pull_request.head.sha || github.sha }}' | cut -b 1-7)" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/hyperlane-xyz/hyperlane-monorepo
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.taggen.outputs.TAG_SHA }}-${{ steps.taggen.outputs.TAG_DATE }}

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read .registryrc
        shell: bash
        run: |
          REGISTRY_VERSION=$(cat .registryrc)
          echo "REGISTRY_VERSION=$REGISTRY_VERSION" >> $GITHUB_ENV

      - name: Read Foundry version
        shell: bash
        run: |
          FOUNDRY_VERSION=$(cat solidity/.foundryrc)
          echo "FOUNDRY_VERSION=$FOUNDRY_VERSION" >> $GITHUB_ENV

      - name: Determine platforms
        id: determine-platforms
        run: |
          if [ "${{ github.event.inputs.include_arm64 }}" == "true" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        id: build
        uses: depot/build-push-action@v1
        with:
          project: 3cpjhx94qv
          context: ./
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FOUNDRY_VERSION=${{ env.FOUNDRY_VERSION }}
            REGISTRY_COMMIT=${{ env.REGISTRY_VERSION }}
          platforms: ${{ steps.determine-platforms.outputs.platforms }}

      - name: Generate job summary
        if: always()
        run: |
          TAG_SHA_DATE="${{ steps.taggen.outputs.TAG_SHA }}-${{ steps.taggen.outputs.TAG_DATE }}"
          REGISTRY="ghcr.io/hyperlane-xyz"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📦 Monorepo Docker Image

          | Service | Tag |
          |---------|-----|
          | 📦 monorepo | \`${TAG_SHA_DATE}\` |

          **Full image path:**
          \`\`\`
          ${REGISTRY}/hyperlane-monorepo:${TAG_SHA_DATE}
          \`\`\`
          EOF
