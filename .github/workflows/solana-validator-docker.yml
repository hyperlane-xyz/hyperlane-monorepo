name: Build and Push Solana Validator Image
on:
  workflow_dispatch:

concurrency:
  group: build-push-solana-validator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          persist-credentials: false
      # Extract AGAVE_VERSION from the Dockerfile so the version and its
      # SHA256 hash are always defined in a single place.
      - name: Read Agave version from Dockerfile
        id: version
        run: |
          set -euo pipefail
          version=$(grep -oP '(?<=AGAVE_VERSION=)v[\d.]+' typescript/svm-sdk/Dockerfile | head -1)
          test -n "$version" || {
            echo "Failed to parse AGAVE_VERSION from typescript/svm-sdk/Dockerfile" >&2
            exit 1
          }
          echo "agave_version=$version" >> "$GITHUB_OUTPUT"
      - name: Set up Depot CLI
        uses: depot/setup-action@v1
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: depot/build-push-action@v1
        with:
          project: 3cpjhx94qv
          context: ./typescript/svm-sdk
          file: ./typescript/svm-sdk/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/hyperlane-xyz/hyperlane-solana-validator:${{ steps.version.outputs.agave_version }}
          platforms: linux/amd64
