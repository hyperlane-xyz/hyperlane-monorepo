cargo-features = ["workspace-inheritance"]

[package]
name = "hyperlane-sealevel-composite-ism"
version = "0.1.0"
edition = "2021"

[features]
no-entrypoint = []

[dependencies]
borsh.workspace = true
getrandom = { workspace = true, features = ["custom"] }
num-derive.workspace = true
num-traits.workspace = true
solana-program.workspace = true
solana-system-interface.workspace = true
thiserror.workspace = true

access-control = { path = "../../../libraries/access-control" }
account-utils = { path = "../../../libraries/account-utils" }
ecdsa-signature = { path = "../../../libraries/ecdsa-signature" }
hyperlane-core = { path = "../../../../main/hyperlane-core" }
hyperlane-sealevel-interchain-security-module-interface = { path = "../../../libraries/interchain-security-module-interface" }
multisig-ism = { path = "../../../libraries/multisig-ism" }
serializable-account-meta = { path = "../../../libraries/serializable-account-meta" }

[dev-dependencies]
hyperlane-test-utils = { path = "../../../libraries/test-utils" }
solana-banks-interface.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
multisig-ism = { path = "../../../libraries/multisig-ism", features = ["test-data"] }
solana-program-test.workspace = true
solana-sdk.workspace = true
litesvm.workspace = true
bincode.workspace = true
# Force these to 3.0.0 so they don't bump solana-hash to 4.x,
# which conflicts with solana-runtime 3.0.7 (uses solana-hash 3.0.0).
solana-epoch-rewards-hasher = "=3.0.0"
solana-blake3-hasher = "=3.0.0"
solana-keccak-hasher = "=3.0.0"
hex.workspace = true
rand = "0.8.5"

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "lib"]
