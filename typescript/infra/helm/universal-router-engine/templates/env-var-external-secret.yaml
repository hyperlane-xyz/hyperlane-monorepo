apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-external-secret
  labels:
    app: {{ .Chart.Name }}
spec:
  secretStoreRef:
    name: external-secrets-gcp-cluster-secret-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: {{ .Chart.Name }}-secret
    template:
      type: Opaque
      metadata:
        labels:
          app: {{ .Chart.Name }}
        annotations:
          update-on-redeploy: "{{ now }}"
      data:
        {{- range .Values.hyperlane.chains }}
        RPC_URL_{{ . | upper | replace "-" "_" }}: {{ printf "'{{ index (.%s_rpcs | fromJson) 0 }}'" . }}
        {{- end }}
  data:
  {{- range .Values.hyperlane.chains }}
  - secretKey: {{ printf "%s_rpcs" . }}
    remoteRef:
      key: {{ printf "%s-rpc-endpoints-%s" $.Values.hyperlane.runEnv . }}
  {{- end }}
