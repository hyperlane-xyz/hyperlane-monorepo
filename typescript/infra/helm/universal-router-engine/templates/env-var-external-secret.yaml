{{- if .Values.hyperlane.chains }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-external-secret
  labels:
    app: {{ .Chart.Name }}
spec:
  secretStoreRef:
    name: external-secrets-gcp-cluster-secret-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: {{ .Chart.Name }}-secret
    template:
      type: Opaque
      metadata:
        labels:
          app: {{ .Chart.Name }}
        annotations:
          update-on-redeploy: "{{ now }}"
      data:
        {{- range $chain := .Values.hyperlane.chains }}
        {{- $chainVar := replace "-" "_" $chain }}
        RPC_URL_{{ $chainVar | upper }}: {{ printf "'{{ index ((index . %q) | fromJson) 0 }}'" (printf "%s_rpcs" $chainVar) }}
        {{- end }}
  data:
  {{- range $chain := .Values.hyperlane.chains }}
  {{- $chainVar := replace "-" "_" $chain }}
  - secretKey: {{ printf "%s_rpcs" $chainVar }}
    remoteRef:
      key: {{ printf "%s-rpc-endpoints-%s" $.Values.hyperlane.runEnv $chain }}
  {{- end }}
{{- end }}
