{{- $image := "" -}}
{{- if .Values.image.digest -}}
{{- $image = printf "%s@%s" .Values.image.repository .Values.image.digest -}}
{{- else -}}
{{- $image = printf "%s:%s" .Values.image.repository (required "image.tag is required when image.digest is unset" .Values.image.tag) -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        prometheus.io/port: "{{ .Values.prometheus_port }}"
        prometheus.io/scrape: "true"
    spec:
{{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ $image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- with .Values.containerSecurityContext }}
          securityContext:
{{ toYaml . | indent 12 }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
{{ toYaml .Values.resources | indent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
            - name: metrics
              containerPort: {{ .Values.prometheus_port }}
          envFrom:
            - secretRef:
                name: {{ .Chart.Name }}-secret
          env:
            - name: REGISTRY_URI
              value: {{ .Values.hyperlane.registryUri | quote }}
{{- with .Values.env }}
{{ toYaml . | indent 12 }}
{{- end }}
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          emptyDir: {}
