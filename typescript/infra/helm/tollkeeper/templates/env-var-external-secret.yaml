apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-external-secret
spec:
  secretStoreRef:
    name: external-secrets-gcp-cluster-secret-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: {{ .Values.secrets.name }}
    template:
      type: Opaque
      data:
        # Tollkeeper-specific secrets
        {{- range .Values.secrets.secret_envs }}
        {{ . }}: {{ printf "'{{ .%s | toString }}'" (. | lower | replace "_" "-") }}
        {{- end }}
        # Shared CoinGecko API key (reuses existing secret)
        COINGECKO_API_KEY: {{ printf "'{{ .%s_coingecko_api_key | toString }}'" .Values.hyperlane.runEnv }}
        # Per-chain RPC URLs (reuses existing secrets)
        {{- range .Values.hyperlane.chains }}
        RPC_URL_{{ . | upper | replace "-" "_" }}: {{ printf "'{{ index (.%s_rpcs | fromJson) 0 }}'" . }}
        {{- end }}
  data:
    # Tollkeeper-specific secrets from GCP
    {{- range .Values.secrets.secret_envs }}
    - secretKey: {{ . | lower | replace "_" "-" }}
      remoteRef:
        key: {{ printf "%s-%s" $.Values.secrets.prefix $.Values.secrets.name }}
        property: {{ . }}
    {{- end }}
    # Shared CoinGecko API key
    - secretKey: {{ printf "%s_coingecko_api_key" .Values.hyperlane.runEnv }}
      remoteRef:
        key: {{ printf "%s-coingecko-api-key" .Values.hyperlane.runEnv }}
    # Per-chain RPC endpoints (existing secrets)
    {{- range .Values.hyperlane.chains }}
    - secretKey: {{ printf "%s_rpcs" . }}
      remoteRef:
        key: {{ printf "%s-rpc-endpoints-%s" $.Values.hyperlane.runEnv . }}
    {{- end }}
