apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        prometheus.io/port: "{{ .Values.prometheus_port }}"
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.port }}
            - name: metrics
              containerPort: {{ .Values.prometheus_port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
          env:
            - name: TOLLKEEPER_MANAGED_CHAINS
              value: {{ .Values.hyperlane.chains | join "," | quote }}
            - name: TOLLKEEPER_ROUTES
              value: {{ .Values.hyperlane.routes | join "," | quote }}
{{- with .Values.env }}
{{ toYaml . | indent 12 }}
{{- end }}
