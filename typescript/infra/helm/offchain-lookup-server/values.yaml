environment: testnet

# General deployment configuration
image:
  # Standalone image (hyperlane-offchain-lookup-server) or monorepo image (hyperlane-monorepo)
  # When using standalone image, set standalone: true
  repository: gcr.io/abacus-labs-dev/hyperlane-monorepo
  # Modify this tag to deploy a new revision.
  # Images can be found here:
  # Standalone: https://console.cloud.google.com/artifacts/docker/abacus-labs-dev/us/gcr.io/hyperlane-offchain-lookup-server
  # Monorepo: https://console.cloud.google.com/artifacts/docker/abacus-labs-dev/us/gcr.io/hyperlane-monorepo
  tag: 88afca1-20250702-173601
  # Set to true when using hyperlane-offchain-lookup-server standalone image
  standalone: false

secrets:
  name: 'offchain-lookup-server'
  # List all secrets which are fetched from the Google Secret Store
  secret_envs:
    - DATABASE_URL

# Ingress / Loadbalancer
# Needs external coordination with Google Cloud External IP and DNS provider
# TODO move over to testnet values (and shutdown old service)
ingress:
  host: offchain-lookup.web3tools.net # Deprecated
  staticIpName: my-ingress-ip # Deprecated

port: 3000
prometheus_port: 9090
