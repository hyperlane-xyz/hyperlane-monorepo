# Container Deployment
# The fee-quoting TypeScript server
# Provides offchain fee quotes for Hyperlane warp routes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        prometheus.io/port: "{{ .Values.prometheus_port }}"
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.port }}
            - name: metrics
              containerPort: {{ .Values.prometheus_port }}
          envFrom:
            - secretRef:
                name: {{ .Chart.Name }}-secrets
          env:
            - name: REGISTRY_URI
              value: {{ .Values.hyperlane.registryUri | quote }}
{{- with .Values.env }}
{{ toYaml . | indent 12 }}
{{- end }}
