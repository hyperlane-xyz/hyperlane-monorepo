[profile.default]
src = 'contracts'
test = 'test'
out = 'out'
cache_path = 'forge-cache'
libs = ["../dependencies", "../lib"]
solc_version = '0.8.22'
evm_version = 'paris'
optimizer_runs = 200
allow_paths = [".."]

[fuzz]
runs = 50

[rpc_endpoints]
mainnet = "${RPC_URL_MAINNET}"
katana = "${RPC_URL_KATANA}"
