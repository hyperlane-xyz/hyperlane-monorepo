[profile.default]
src = 'contracts'
test = 'test'
out = 'out'
cache_path = 'forge-cache'
libs = ["../dependencies", "../lib"]
solc_version = '0.8.22'
evm_version = 'paris'
optimizer_runs = 200
allow_paths = [".."]

[rpc_endpoints]
mainnet = "${MAINNET3_ETHEREUM_RPC_URLS}"
arbitrum = "${MAINNET3_ARBITRUM_RPC_URLS}"

[fuzz]
runs = 50
