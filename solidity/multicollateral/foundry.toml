[profile.default]
src = 'contracts'
test = 'test'
out = 'out'
cache_path = 'forge-cache'
libs = ["../dependencies", "../lib"]
solc_version = '0.8.22'
evm_version = 'paris'
optimizer_runs = 200
allow_paths = [".."]

[rpc_endpoints]
mainnet = "${RPC_URL_MAINNET}"
arbitrum = "${RPC_URL_ARBITRUM}"

[fmt]
line_length = 80
tab_width = 4
bracket_spacing = false
int_types = "preserve"
quote_style = "double"
number_underscore = "preserve"
hex_underscore = "preserve"
single_line_statement_blocks = "preserve"
multiline_func_header = "params_first_multi"
docs_style = "preserve"
single_line_imports = true
ignore = ["../dependencies/**", "../lib/**"]

[fuzz]
runs = 50
